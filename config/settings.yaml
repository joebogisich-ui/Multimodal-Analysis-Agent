# 系统配置文件

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: false
  log_level: "info"
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

# 数据库与缓存配置
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  max_connections: 50

# 文件存储配置
storage:
  upload_dir: "./uploads"
  temp_dir: "./temp"
  max_file_size: 104857600  # 100MB
  allowed_extensions:
    - ".csv"
    - ".json"
    - ".xlsx"
    - ".xls"
    - ".txt"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".mp3"
    - ".wav"
    - ".mp4"
    - ".avi"
    - ".mov"

# AI 模型配置
ai:
  provider: "openai"  # openai 或 anthropic
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4-turbo-preview"
    temperature: 0.7
    max_tokens: 4096
  anthropic:
    api_key: "${CLAUDE_API_KEY}"
    model: "claude-3-opus-20240229"
    temperature: 0.7
    max_tokens: 4096

# Agent 配置
agent:
  timeout: 300  # 任务超时时间（秒）
  max_retries: 3
  retry_delay: 5
  cache_enabled: true
  cache_ttl: 3600  # 缓存生存时间（秒）
  parallel_tasks: 5  # 最大并发任务数

# 数据处理配置
processing:
  text:
    max_length: 50000
    languages: ["zh", "en"]
    embedding_model: "text-embedding-ada-002"
  image:
    max_size: 10485760  # 10MB
    supported_formats: ["jpg", "jpeg", "png", "gif", "webp"]
    thumbnail_size: [256, 256]
  audio:
    max_duration: 3600  # 秒
    sample_rate: 16000
    supported_formats: ["mp3", "wav", "aac", "flac"]
  video:
    max_duration: 7200  # 秒
    max_frames: 1000
    thumbnail_interval: 10  # 秒

# 分析引擎配置
analysis:
  statistics:
    enabled: true
    confidence_level: 0.95
  trend:
    enabled: true
    forecast_periods: 12
    seasonality_detection: true
  clustering:
    enabled: true
    max_clusters: 20
    algorithm: "kmeans"  # kmeans, hierarchical, dbscan
  correlation:
    enabled: true
    method: "pearson"  # pearson, spearman, kendall

# 可视化配置
visualization:
  default_theme: "light"
  color_schemes:
    categorical: "category10"
    sequential: "blues"
    diverging: "RdBu"
  export_formats:
    - "png"
    - "svg"
    - "pdf"
    - "html"
  chart_width: 800
  chart_height: 600
  dashboard:
    columns: 12
    row_height: 100

# 日志配置
logging:
  version: 1
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 安全配置
security:
  secret_key: "${SECRET_KEY}"
  algorithm: "HS256"
  access_token_expire_minutes: 60
  refresh_token_expire_days: 7
  rate_limit:
    enabled: true
    requests_per_minute: 60
